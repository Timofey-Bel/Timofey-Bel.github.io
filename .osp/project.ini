[MedX]

app_start_command = 
backend_enabled   = off
backend_ip        = 
backend_port      = 
base_url          = {host_scheme}://{host_decoded}{scheme_port}
bind_ip           = auto
environment       = System
http_engine       = Apache
http_port         = 80
https_port        = 443
node_engine       = 
php_engine        = PHP-8.5
project_enabled   = on
project_root      = {base_dir}
server_aliases    = www.{host} alias-example.local
terminal_codepage = 65001
tls_cert_file     = auto
tls_enabled       = on
tls_key_file      = auto
web_root          = {base_dir}\public
